<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commission — Charlotte Carkuff Art</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #f7f2ea;
      --cream-dark: #ede6d6;
      --green: #2d4a35;
      --green-light: #3d6347;
      --green-muted: #7a9e83;
      --terracotta: #c4714a;
      --terracotta-light: #d9957a;
      --charcoal: #2a2620;
      --charcoal-soft: #4a4540;
      --gold: #b89a5a;
      --white: #fefcf8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--charcoal);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.4rem 3rem;
      background: rgba(247, 242, 234, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(45, 74, 53, 0.1);
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--green);
      text-decoration: none;
    }

    .nav-logo span { font-weight: 300; font-style: italic; color: var(--terracotta); }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a {
      text-decoration: none;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--charcoal-soft);
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--green); }
    .nav-cta {
      background: var(--green);
      color: var(--cream) !important;
      padding: 0.5rem 1.2rem;
      border-radius: 2px;
    }
    .nav-cta:hover { background: var(--green-light) !important; }

    .page-wrap {
      max-width: 700px;
      margin: 0 auto;
      padding: 7rem 3rem 5rem;
      min-height: 100vh;
    }

    .page-heading {
      text-align: center;
      margin-bottom: 3rem;
    }

    .label {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--terracotta);
      margin-bottom: 1rem;
    }

    .page-heading h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 4vw, 4rem);
      font-weight: 300;
      line-height: 1.1;
      color: var(--charcoal);
      margin-bottom: 1.5rem;
    }

    .page-heading h1 em { font-style: italic; color: var(--green); }

    .page-heading p {
      font-size: 0.95rem;
      line-height: 1.85;
      color: var(--charcoal-soft);
    }

    .commission-form {
      display: grid;
      gap: 1.8rem;
      margin-top: 2.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 0.6rem;
      font-weight: 500;
    }

    .form-group input,
    .form-group textarea {
      background: var(--cream-dark);
      border: 1px solid rgba(45,74,53,0.15);
      color: var(--charcoal);
      padding: 0.85rem 1rem;
      border-radius: 3px;
      font-family: 'Jost', sans-serif;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }

    .form-group text
